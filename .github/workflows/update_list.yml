name: Daily Threat Intel Update

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at Midnight UTC
  workflow_dispatch: # Adds a button to let you run it manually from the website

permissions:
  contents: write

jobs:
  update-blocklist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Aggregator Script
        run: python threat_aggregator.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add master_blocklist.txt
          # If there are no new trackers today, do not crash, just exit cleanly
          git commit -m "Automated update: Synchronized latest global threat intel" || exit 0
          git push
